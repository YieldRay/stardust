<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarDust — Web Components</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./docs/docs.css" />
  <script type="module" src="./src/stardust.ts"></script>
  <script type="module" src="./docs/components.ts"></script>
</head>
<body>
  <header>
    <div class="header-left">
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">☰</button>
      <a class="logo" href="#sd-button">★ StarDust</a>
      <span class="version">Lit 3</span>
    </div>
    <div class="header-right">
      <a class="gh-link" href="https://github.com/yangrui81/stardust" target="_blank" rel="noopener">GitHub</a>
      <button class="dark-toggle" id="dark-toggle">Dark</button>
    </div>
  </header>

  <div class="layout">
    <nav id="sidebar">
      <div class="nav-inner">
        <section class="nav-section">
          <h3>Components</h3>
          <ul id="nav-components"></ul>
        </section>
        <section class="nav-section">
          <h3>Containers</h3>
          <ul id="nav-containers"></ul>
        </section>
      </div>
    </nav>

    <main id="content">
      <div id="page"></div>
    </main>
  </div>

  <script>
    const darkToggle = document.getElementById('dark-toggle');
    const navToggle = document.getElementById('nav-toggle');
    const sidebar = document.getElementById('sidebar');

    const saved = localStorage.getItem('sd-dark');
    if (saved === 'true') {
      document.documentElement.setAttribute('data-dark-mode', '');
      darkToggle.textContent = 'Light';
    }

    darkToggle.addEventListener('click', () => {
      const isDark = document.documentElement.hasAttribute('data-dark-mode');
      if (isDark) {
        document.documentElement.removeAttribute('data-dark-mode');
        darkToggle.textContent = 'Dark';
        localStorage.setItem('sd-dark', 'false');
      } else {
        document.documentElement.setAttribute('data-dark-mode', '');
        darkToggle.textContent = 'Light';
        localStorage.setItem('sd-dark', 'true');
      }
    });

    navToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });
  </script>
</body>
</html>
